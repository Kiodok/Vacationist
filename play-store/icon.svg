<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="42%" cy="38%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#2D1B69"/>
      <stop offset="55%"  stop-color="#130D2E"/>
      <stop offset="100%" stop-color="#09060F"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6C63FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Soft purple glow behind the pin -->
  <ellipse cx="256" cy="362" rx="110" ry="90" fill="url(#glow)"/>

  <!-- V shape -->
  <path d="M 108 108 L 256 366 L 404 108"
        stroke="#FFFFFF"
        stroke-width="64"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Map-pin at V tip: outer ring -->
  <circle cx="256" cy="366" r="48" fill="#6C63FF"/>
  <!-- Map-pin: inner white dot -->
  <circle cx="256" cy="366" r="22" fill="#FFFFFF"/>
</svg>
