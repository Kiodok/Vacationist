<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <defs>
    <radialGradient id="rightGlow" cx="80%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#3D35A0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0F0F0F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pinGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6C63FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="routeLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6C63FF" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#6C63FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="#0F0F0F"/>
  <rect width="1024" height="500" fill="url(#rightGlow)"/>

  <!-- Subtle grid lines (right half) -->
  <g stroke="#1E1E1E" stroke-width="1">
    <line x1="580" y1="0" x2="580" y2="500"/>
    <line x1="660" y1="0" x2="660" y2="500"/>
    <line x1="740" y1="0" x2="740" y2="500"/>
    <line x1="820" y1="0" x2="820" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="980" y1="0" x2="980" y2="500"/>
    <line x1="540" y1="0" x2="1024" y2="0"/>
    <line x1="540" y1="80" x2="1024" y2="80"/>
    <line x1="540" y1="160" x2="1024" y2="160"/>
    <line x1="540" y1="240" x2="1024" y2="240"/>
    <line x1="540" y1="320" x2="1024" y2="320"/>
    <line x1="540" y1="400" x2="1024" y2="400"/>
    <line x1="540" y1="480" x2="1024" y2="480"/>
  </g>

  <!-- Route arc from bottom-left of right zone to top-right -->
  <path d="M 600 420 Q 720 160 950 90"
        stroke="url(#routeLine)" stroke-width="3" fill="none" stroke-dasharray="8 6"/>

  <!-- Glow circles around pins -->
  <circle cx="620" cy="400" r="40" fill="url(#pinGlow)"/>
  <circle cx="780" cy="230" r="40" fill="url(#pinGlow)"/>
  <circle cx="940" cy="100" r="40" fill="url(#pinGlow)"/>

  <!-- Pin A (departure) -->
  <circle cx="620" cy="400" r="14" fill="#6C63FF"/>
  <circle cx="620" cy="400" r="6"  fill="#FFFFFF"/>

  <!-- Pin B (waypoint) -->
  <circle cx="780" cy="230" r="14" fill="#6C63FF"/>
  <circle cx="780" cy="230" r="6"  fill="#FFFFFF"/>

  <!-- Pin C (destination) -->
  <circle cx="940" cy="100" r="18" fill="#6C63FF"/>
  <circle cx="940" cy="100" r="7"  fill="#FFFFFF"/>

  <!-- Floating member dots near pins (collaborative feel) -->
  <circle cx="648" cy="382" r="8" fill="#1A1A1A" stroke="#6C63FF" stroke-width="2"/>
  <circle cx="662" cy="375" r="8" fill="#1A1A1A" stroke="#8B83FF" stroke-width="2"/>
  <circle cx="800" cy="214" r="8" fill="#1A1A1A" stroke="#6C63FF" stroke-width="2"/>
  <circle cx="814" cy="207" r="8" fill="#1A1A1A" stroke="#8B83FF" stroke-width="2"/>
  <circle cx="826" cy="200" r="8" fill="#1A1A1A" stroke="#A89CFF" stroke-width="2"/>

  <!-- Small scatter dots (ambient) -->
  <circle cx="700" cy="310" r="3" fill="#6C63FF" opacity="0.25"/>
  <circle cx="860" cy="170" r="3" fill="#6C63FF" opacity="0.25"/>
  <circle cx="980" cy="290" r="2" fill="#6C63FF" opacity="0.2"/>
  <circle cx="630" cy="200" r="2" fill="#6C63FF" opacity="0.2"/>

  <!-- ─── Left text zone ─── -->

  <!-- App name -->
  <text x="64" y="148" font-size="82" font-weight="700" fill="#FFFFFF" letter-spacing="-2">Vacationist</text>

  <!-- Tagline -->
  <text x="68" y="198" font-size="30" font-weight="400" fill="#6C63FF" letter-spacing="0.5">Plan trips. Together.</text>

  <!-- Divider -->
  <line x1="64" y1="224" x2="500" y2="224" stroke="#2E2E2E" stroke-width="1.5"/>

  <!-- Feature 1 -->
  <circle cx="80" cy="266" r="5" fill="#6C63FF"/>
  <text x="100" y="271" font-size="21" fill="#E0E0E0">Vote on activities, built for groups</text>

  <!-- Feature 2 -->
  <circle cx="80" cy="316" r="5" fill="#6C63FF"/>
  <text x="100" y="321" font-size="21" fill="#E0E0E0">Split expenses with zero friction</text>

  <!-- Feature 3 -->
  <circle cx="80" cy="366" r="5" fill="#6C63FF"/>
  <text x="100" y="371" font-size="21" fill="#E0E0E0">Encrypted travel documents, secure</text>

  <!-- Feature 4 -->
  <circle cx="80" cy="416" r="5" fill="#6C63FF"/>
  <text x="100" y="421" font-size="21" fill="#E0E0E0">Real-time shopping lists &amp; notes</text>

  <!-- Subtle "V" mini icon bottom-left -->
  <path d="M 64 464 L 76 485 L 88 464"
        stroke="#2D1B69" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="76" cy="485" r="4" fill="#3D35A0"/>
</svg>
