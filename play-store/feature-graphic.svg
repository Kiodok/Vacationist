<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg"
     font-family="'Segoe UI','Helvetica Neue',system-ui,Arial,sans-serif">
  <defs>
    <!-- Dot grid for right half -->
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.1" fill="#1C1C1C"/>
    </pattern>

    <!-- Radial purple glow from centre-right -->
    <radialGradient id="bgGlow" cx="74%" cy="50%" r="54%">
      <stop offset="0%"   stop-color="#26145C" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0F0F0F" stop-opacity="0"/>
    </radialGradient>

    <!-- Card body gradient (top → bottom) -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1D1D2C"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>

    <!-- Card header gradient (left → right) -->
    <linearGradient id="hdrGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#201E38"/>
      <stop offset="100%" stop-color="#191728"/>
    </linearGradient>

    <!-- Progress bar fill -->
    <linearGradient id="prog" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#A89CFF"/>
    </linearGradient>

    <!-- Left-edge fade: blends card into background -->
    <linearGradient id="lFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0F0F0F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0F0F0F" stop-opacity="0"/>
    </linearGradient>

    <!-- Card drop-shadow / glow -->
    <filter id="cardGlow" x="-14%" y="-14%" width="128%" height="128%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
      <feFlood flood-color="#6C63FF" flood-opacity="0.20" result="colour"/>
      <feComposite in="colour" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ════════════════════════════════════════ -->
  <!--  BACKGROUND                             -->
  <!-- ════════════════════════════════════════ -->
  <rect width="1024" height="500" fill="#0F0F0F"/>
  <!-- Dot grid — right half only -->
  <rect x="518" y="0" width="506" height="500" fill="url(#dotGrid)"/>
  <!-- Purple glow -->
  <rect width="1024" height="500" fill="url(#bgGlow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="500" fill="#6C63FF"/>
  <!-- Top accent hairline -->
  <rect x="0" y="0" width="1024" height="2" fill="#6C63FF" opacity="0.35"/>

  <!-- Ambient background dots (right half, behind card) -->
  <circle cx="556" cy="78"  r="3" fill="#6C63FF" opacity="0.18"/>
  <circle cx="970" cy="420" r="3" fill="#6C63FF" opacity="0.15"/>
  <circle cx="990" cy="140" r="2" fill="#A89CFF" opacity="0.20"/>
  <circle cx="544" cy="390" r="2" fill="#6C63FF" opacity="0.15"/>
  <!-- Faint connecting lines between ambient dots -->
  <line x1="556" y1="78"  x2="990" y2="140" stroke="#6C63FF" stroke-width="0.8" opacity="0.07"/>
  <line x1="990" y1="140" x2="970" y2="420" stroke="#6C63FF" stroke-width="0.8" opacity="0.07"/>

  <!-- ════════════════════════════════════════ -->
  <!--  TRIP CARD (RIGHT SIDE)                 -->
  <!-- ════════════════════════════════════════ -->

  <!-- Card glow layer (rendered behind card for shadow effect) -->
  <rect x="574" y="54" width="416" height="396" rx="22" fill="none" filter="url(#cardGlow)"/>

  <!-- Card body -->
  <rect x="574" y="54" width="416" height="396" rx="22"
        fill="url(#cardGrad)" stroke="#272738" stroke-width="1.5"/>

  <!-- Card header background -->
  <rect x="574" y="54"  width="416" height="88" rx="22" fill="url(#hdrGrad)"/>
  <!-- Square-off the header bottom corners -->
  <rect x="574" y="120" width="416" height="22" fill="url(#hdrGrad)"/>

  <!-- Trip destination badge (sun/beach icon) -->
  <circle cx="610" cy="98" r="26" fill="#FF7B3A" fill-opacity="0.15" stroke="#FF7B3A" stroke-opacity="0.40" stroke-width="1.5"/>
  <!-- Sun body -->
  <circle cx="610" cy="98" r="9" fill="#FF8C42" fill-opacity="0.90"/>
  <!-- Sun rays -->
  <line x1="610" y1="83"  x2="610" y2="79"  stroke="#FF8C42" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.65"/>
  <line x1="610" y1="113" x2="610" y2="117" stroke="#FF8C42" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.65"/>
  <line x1="595" y1="98"  x2="591" y2="98"  stroke="#FF8C42" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.65"/>
  <line x1="625" y1="98"  x2="629" y2="98"  stroke="#FF8C42" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.65"/>
  <line x1="599" y1="87"  x2="596" y2="84"  stroke="#FF8C42" stroke-width="2"   stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="621" y1="87"  x2="624" y2="84"  stroke="#FF8C42" stroke-width="2"   stroke-linecap="round" stroke-opacity="0.55"/>

  <!-- Trip title & dates -->
  <text x="648" y="94"  font-size="19" font-weight="700" fill="#FFFFFF">Greece Trip</text>
  <text x="648" y="116" font-size="12.5" fill="#68687E">Jun 14 – Jun 22  ·  8 days</text>

  <!-- Member avatar rings (right side of header) -->
  <circle cx="963" cy="97" r="17" fill="#181828" stroke="#3ECF8E"  stroke-width="2.5"/>
  <circle cx="940" cy="97" r="17" fill="#181828" stroke="#6C63FF"  stroke-width="2.5"/>
  <circle cx="917" cy="97" r="17" fill="#181828" stroke="#FDA444"  stroke-width="2.5"/>
  <circle cx="894" cy="97" r="17" fill="#181828" stroke="#FF6B9D"  stroke-width="2.5"/>
  <!-- Initials -->
  <text x="963" y="102" font-size="11" font-weight="700" fill="#3ECF8E" text-anchor="middle">A</text>
  <text x="940" y="102" font-size="11" font-weight="700" fill="#8B83FF" text-anchor="middle">S</text>
  <text x="917" y="102" font-size="11" font-weight="700" fill="#FDA444" text-anchor="middle">M</text>
  <text x="894" y="102" font-size="11" font-weight="700" fill="#FF6B9D" text-anchor="middle">K</text>

  <!-- Header divider -->
  <line x1="594" y1="152" x2="970" y2="152" stroke="#222234" stroke-width="1"/>

  <!-- ── ROW 1: VOTING ── -->
  <rect x="594" y="160" width="376" height="60" rx="10" fill="#18182A"/>
  <!-- Vote icon circle -->
  <circle cx="626" cy="190" r="19" fill="#6C63FF" fill-opacity="0.18"/>
  <!-- Checkmark -->
  <polyline points="617,190 622,197 636,179"
            stroke="#6C63FF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Text -->
  <text x="657" y="186" font-size="14.5" font-weight="600" fill="#E8E8F0">Santorini boat tour</text>
  <text x="657" y="205" font-size="12"   fill="#55556A">Activity vote · open</text>
  <!-- Vote tally badge -->
  <rect x="870" y="168" width="86" height="26" rx="13" fill="#3ECF8E" fill-opacity="0.13"/>
  <text x="913" y="185" font-size="12" fill="#3ECF8E" text-anchor="middle" font-weight="700">4 like  ·  1 skip</text>

  <!-- ── ROW 2: EXPENSE ── -->
  <rect x="594" y="230" width="376" height="60" rx="10" fill="#18182A"/>
  <!-- Expense icon circle -->
  <circle cx="626" cy="260" r="19" fill="#3ECF8E" fill-opacity="0.18"/>
  <!-- Dollar sign -->
  <text x="626" y="268" font-size="20" font-weight="800" fill="#3ECF8E" text-anchor="middle">$</text>
  <!-- Text -->
  <text x="657" y="256" font-size="14.5" font-weight="600" fill="#E8E8F0">Hotel Athens  ·  €244</text>
  <text x="657" y="275" font-size="12"   fill="#55556A">Split equally · 4 people</text>
  <!-- Per-person amount -->
  <text x="964" y="264" font-size="15.5" font-weight="700" fill="#3ECF8E" text-anchor="end">€61 / pp</text>

  <!-- ── ROW 3: SHOPPING LIST ── -->
  <rect x="594" y="300" width="376" height="60" rx="10" fill="#18182A"/>
  <!-- List icon circle -->
  <circle cx="626" cy="330" r="19" fill="#FDA444" fill-opacity="0.18"/>
  <!-- Three-bar list icon -->
  <line x1="616" y1="323" x2="636" y2="323" stroke="#FDA444" stroke-width="2.3" stroke-linecap="round"/>
  <line x1="616" y1="330" x2="636" y2="330" stroke="#FDA444" stroke-width="2.3" stroke-linecap="round"/>
  <line x1="616" y1="337" x2="628" y2="337" stroke="#FDA444" stroke-width="2.3" stroke-linecap="round"/>
  <!-- Text -->
  <text x="657" y="326" font-size="14.5" font-weight="600" fill="#E8E8F0">Packing list</text>
  <text x="657" y="345" font-size="12"   fill="#55556A">5 of 12 items  ·  shared with group</text>
  <!-- Progress track -->
  <rect x="820" y="319" width="126" height="8" rx="4" fill="#222234"/>
  <!-- Progress fill (5/12 ≈ 42%) -->
  <rect x="820" y="319" width="53"  height="8" rx="4" fill="url(#prog)"/>

  <!-- ── INVITE / NO-ACCOUNT STRIP ── -->
  <rect x="594" y="372" width="376" height="66" rx="10" fill="#6C63FF" fill-opacity="0.07"/>
  <line x1="594" y1="372" x2="970" y2="372" stroke="#222234" stroke-width="1"/>
  <!-- Lock icon circle -->
  <circle cx="622" cy="405" r="15" fill="#6C63FF" fill-opacity="0.18"/>
  <!-- Lock body -->
  <rect x="615" y="403" width="14" height="10" rx="2.5"
        fill="none" stroke="#A89CFF" stroke-width="2"/>
  <!-- Lock shackle -->
  <path d="M617,403 L617,399 Q617,395 622,395 Q627,395 627,399 L627,403"
        fill="none" stroke="#A89CFF" stroke-width="2" stroke-linecap="round"/>
  <!-- Text -->
  <text x="647" y="401" font-size="13.5" font-weight="600" fill="#C4BDFF">No account needed to join</text>
  <text x="647" y="419" font-size="12"   fill="#55556A">Share a link — guests vote immediately</text>

  <!-- Left-edge fade (softens card→text boundary) -->
  <rect x="516" y="0" width="96" height="500" fill="url(#lFade)"/>

  <!-- ════════════════════════════════════════ -->
  <!--  LEFT TEXT ZONE                         -->
  <!-- ════════════════════════════════════════ -->

  <!-- Category eyebrow -->
  <text x="64" y="106" font-size="12" font-weight="700" letter-spacing="4" fill="#6C63FF">GROUP TRIP PLANNER</text>

  <!-- App name -->
  <text x="62" y="184" font-size="77" font-weight="800" letter-spacing="-2" fill="#FFFFFF">Vacationist</text>

  <!-- Tagline -->
  <text x="65" y="222" font-size="22" font-weight="400" letter-spacing="0.3" fill="#8B83FF">Plan. Vote. Split. Travel together.</text>

  <!-- Divider -->
  <line x1="64" y1="247" x2="506" y2="247" stroke="#252525" stroke-width="1.5"/>

  <!-- ── FEATURE 1: Vote ── -->
  <circle cx="78" cy="278" r="17" fill="#6C63FF" fill-opacity="0.14" stroke="#6C63FF" stroke-width="1.5" stroke-opacity="0.45"/>
  <!-- Checkmark -->
  <polyline points="70,278 75,285 86,268"
            stroke="#6C63FF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="107" y="284" font-size="16.5" fill="#C2C2C8">Vote on activities — no more polls</text>

  <!-- ── FEATURE 2: Expense ── -->
  <circle cx="78" cy="316" r="17" fill="#3ECF8E" fill-opacity="0.14" stroke="#3ECF8E" stroke-width="1.5" stroke-opacity="0.45"/>
  <text x="78" y="323" font-size="18" font-weight="800" fill="#3ECF8E" text-anchor="middle">$</text>
  <text x="107" y="322" font-size="16.5" fill="#C2C2C8">Split every expense instantly</text>

  <!-- ── FEATURE 3: Lists ── -->
  <circle cx="78" cy="354" r="17" fill="#FDA444" fill-opacity="0.14" stroke="#FDA444" stroke-width="1.5" stroke-opacity="0.45"/>
  <line x1="69" y1="348" x2="87" y2="348" stroke="#FDA444" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="69" y1="354" x2="87" y2="354" stroke="#FDA444" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="69" y1="360" x2="81" y2="360" stroke="#FDA444" stroke-width="2.2" stroke-linecap="round"/>
  <text x="107" y="360" font-size="16.5" fill="#C2C2C8">Shared lists &amp; notes, live</text>

  <!-- ── FEATURE 4: Encrypted docs ── -->
  <circle cx="78" cy="392" r="17" fill="#A89CFF" fill-opacity="0.14" stroke="#A89CFF" stroke-width="1.5" stroke-opacity="0.45"/>
  <!-- Lock body -->
  <rect x="71" y="391" width="14" height="10" rx="2.5"
        fill="none" stroke="#A89CFF" stroke-width="2"/>
  <!-- Lock shackle -->
  <path d="M73,391 L73,387 Q73,383 78,383 Q83,383 83,387 L83,391"
        fill="none" stroke="#A89CFF" stroke-width="2" stroke-linecap="round"/>
  <text x="107" y="398" font-size="16.5" fill="#C2C2C8">Encrypted travel documents</text>

  <!-- Footer note -->
  <text x="64" y="455" font-size="13" fill="#3C3C50">Free  ·  Android  ·  Real-time sync</text>

</svg>
